<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字员工报价平台 · 管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <link rel="stylesheet" href="/css/brand.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-lockup brand-lockup--dark">
          <img src="/images/foundex-logo-light.png" alt="Foundex" class="brand-wordmark brand-wordmark--on-dark" />
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="brand-copy">
            <strong id="sidebar-brand-name">数字员工报价平台</strong>
            <span>Foundex · 管理后台</span>
          </span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard">数据概览</button>
        <button class="nav-item" data-page="quotes">报价单</button>
        <button class="nav-item" data-page="agents">智能体管理</button>
        <button class="nav-item" data-page="platform">平台设置</button>
        <div class="nav-divider">当前编辑的智能体</div>
        <select id="agent-config-select" class="agent-config-select" title="切换后分别保存各产品的定价/增值/成本"></select>
        <button class="nav-item" data-page="pricing">定价规则</button>
        <button class="nav-item" data-page="addons">增值项</button>
        <button class="nav-item" data-page="costs">成本配置</button>
        <button class="nav-item" data-page="profit">成本利润分析</button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" id="logout-btn">退出登录</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h2 id="page-title">数据概览</h2>
        <a href="/" class="btn btn-ghost btn-sm">查看报价页</a>
      </header>

      <div class="page-body">
        <section id="page-dashboard" class="page-section active">
          <div class="stats-grid" id="stats-grid"></div>
          <div class="panel">
            <div class="panel-header"><h3>最近报价申请</h3></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>客户</th>
                    <th>智能体</th>
                    <th>门店 / 年限</th>
                    <th>合同总金额</th>
                    <th>状态</th>
                    <th>时间</th>
                  </tr>
                </thead>
                <tbody id="recent-quotes"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="page-quotes" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>全部报价单</h3>
              <select id="status-filter">
                <option value="">全部状态</option>
                <option value="pending">待处理</option>
                <option value="contacted">已联系</option>
                <option value="quoted">已报价</option>
                <option value="won">已成交</option>
                <option value="lost">已流失</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>客户</th>
                    <th>企业</th>
                    <th>智能体</th>
                    <th>门店 / 年限</th>
                    <th>合同金额</th>
                    <th>状态</th>
                    <th>时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="quotes-table"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="page-agents" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>智能体目录</h3>
              <button class="btn btn-primary btn-sm" id="btn-new-agent">新建智能体</button>
            </div>
            <div class="panel-body" id="agents-list"></div>
          </div>
        </section>

        <section id="page-platform" class="page-section">
          <div class="panel">
            <div class="panel-header"><h3>平台设置（组合折扣）</h3></div>
            <div class="panel-body" id="platform-editor"></div>
            <div class="panel-footer">
              <button class="btn btn-primary btn-sm" id="save-platform">保存组合折扣</button>
            </div>
          </div>
        </section>

        <section id="page-pricing" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>定价规则 — <span id="config-agent-name">—</span></h3>
              <select id="pricing-agent-select" class="agent-inline-select"></select>
            </div>
            <div class="panel-body" id="pricing-editor"></div>
            <div class="panel-footer">
              <button class="btn btn-primary btn-sm" id="save-pricing">保存本产品定价</button>
            </div>
          </div>
        </section>

        <section id="page-addons" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>增值项 — <span id="config-agent-name-addons">—</span></h3>
              <select id="addons-agent-select" class="agent-inline-select"></select>
            </div>
            <div class="panel-body" id="addons-editor"></div>
            <div class="panel-footer">
              <button class="btn btn-primary btn-sm" id="save-addons">保存本产品增值项</button>
            </div>
          </div>
        </section>

        <section id="page-costs" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>成本配置 — <span id="config-agent-name-costs">—</span></h3>
              <select id="costs-agent-select" class="agent-inline-select"></select>
            </div>
            <div class="panel-body" id="costs-editor"></div>
            <div class="panel-footer">
              <button class="btn btn-primary btn-sm" id="save-costs">保存本产品成本</button>
            </div>
          </div>
        </section>

        <section id="page-profit" class="page-section">
          <div class="panel">
            <div class="panel-header">
              <h3>成本与利润分析</h3>
              <div class="profit-controls">
                <select id="profit-quote-select"><option value="">选择报价单…</option></select>
                <button class="btn btn-primary btn-sm" id="calc-profit">重新计算</button>
              </div>
            </div>
            <div class="panel-body" id="profit-result">
              <p class="empty-state">请选择一条报价单查看成本利润分析</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="quote-modal">
    <div class="modal modal-wide">
      <h3>报价单详情</h3>
      <div id="quote-detail"></div>
      <div id="quote-breakdown"></div>
      <div class="form-group">
        <label>状态</label>
        <select id="modal-status">
          <option value="pending">待处理</option>
          <option value="contacted">已联系</option>
          <option value="quoted">已报价</option>
          <option value="won">已成交</option>
          <option value="lost">已流失</option>
        </select>
      </div>
      <div class="form-group">
        <label>最终合同金额 (¥)</label>
        <input type="number" id="modal-final-total" placeholder="留空则使用系统估算" />
      </div>
      <div class="form-group">
        <label>内部备注</label>
        <textarea id="modal-notes"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger btn-sm" id="modal-delete">删除</button>
        <button type="button" class="btn btn-primary btn-sm" id="modal-generate-doc">生成对客报价单</button>
        <span style="flex:1"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="modal-close">取消</button>
        <button type="button" class="btn btn-primary btn-sm" id="modal-save">保存</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
